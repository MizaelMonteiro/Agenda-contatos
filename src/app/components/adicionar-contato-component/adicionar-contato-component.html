    <form [formGroup]="contatoForm" (ngSubmit)="adicionarContato()">
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" class="form-control" formControlName="nome"> 

        </div>
        <div class="form-group">
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" name="telefone" class="form-control" formControlName="telefone">

        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" class="form-control" formControlName="email">

        </div>
        <div class="form-group">
            <label for="aniversario">Aniversário:</label>
            <input type="date" id="aniversario" name="aniversario" class="form-control" formControlName="aniversario">

        </div>
        <div class="form-group">
            <label for="tipo">Tipo:</label>
            <input type="text" id="tipo" name="tipo" class="form-control" formControlName="tipo">

        </div>
        <div>
            <input type="submit"
            value="Adicionar Contato"
            [disabled]="contatoForm.invalid"
            class="btn btn-primary">
        </div>
        
    </form>
